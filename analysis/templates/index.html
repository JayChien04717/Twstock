<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 台股分析師</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.1/dist/chartjs-chart-financial.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-secondary: #131520;
            --bg-card: rgba(26, 30, 46, 0.4);
            --bg-card-hover: rgba(36, 42, 63, 0.6);
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.2);
            --green: #00ffa3;
            --red: #ff3366;
            --orange: #ffb800;
            --text-primary: #f0f2f8;
            --text-secondary: #a0a8c2;
            --text-muted: #5f6b8e;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --gradient-1: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-2: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-green: linear-gradient(135deg, #0ba360 0%, #3cba92 100%);
            --gradient-red: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ─── Animated Background Mesh ──────────────── */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate;
        }
        body::before {
            background: rgba(102, 126, 234, 0.2);
            top: -200px;
            left: -200px;
        }
        body::after {
            background: rgba(0, 242, 254, 0.15);
            bottom: -200px;
            right: -200px;
            animation-delay: -10s;
        }
        @keyframes float {
            0% { transform: translate(0, 0); }
            50% { transform: translate(50px, 80px); }
            100% { transform: translate(-30px, 40px); }
        }

        /* ─── Header ─────────────────────────── */
        .header {
            background: rgba(19, 21, 32, 0.7);
            border-bottom: 1px solid var(--border);
            padding: 18px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-controls {
            display: flex;
            gap: 14px;
            align-items: center;
        }
        .header-controls input, .header-controls select {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .header-controls input:focus, .header-controls select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
            background: rgba(0, 0, 0, 0.4);
        }
        .btn {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: var(--gradient-1);
            color: #000;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }
        .btn-primary:after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0) 50%);
            transform: rotate(30deg) translateY(-20px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4); 
        }
        .btn-primary:hover:after { opacity: 1; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; filter: grayscale(1); }

        /* ─── Tabs ───────────────────────────── */
        .tabs {
            display: flex;
            gap: 6px;
            padding: 16px 36px 0;
            background: transparent;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
        }
        .tabs::-webkit-scrollbar { height: 4px; }
        .tabs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .tab {
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            position: relative;
            white-space: nowrap;
        }
        .tab:after {
            content: '';
            position: absolute;
            bottom: -2px; left: 50%;
            width: 0; height: 2px;
            background: var(--gradient-1);
            transition: width 0.3s ease, left 0.3s ease;
            border-radius: 2px 2px 0 0;
            box-shadow: 0 -2px 10px var(--accent-glow);
        }
        .tab:hover { color: var(--text-primary); }
        .tab.active {
            color: var(--text-primary);
        }
        .tab.active:after {
            width: 100%;
            left: 0;
        }

        /* ─── Main Content ───────────────────── */
        .main { padding: 32px 36px; max-width: 1500px; margin: 0 auto; position: relative; z-index: 1;}
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideFadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideFadeUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* ─── Cards ──────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            pointer-events: none;
        }
        .card:hover { 
            border-color: var(--border-hover); 
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        @media (max-width: 1024px) { .grid-2 { grid-template-columns: 1fr; } .grid-3 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .grid-3 { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 16px; align-items: flex-start; } .header-controls { width: 100%; display: grid; grid-template-columns: 1fr auto; } .header-controls input { width: 100%; } }

        /* ─── Stock Ranking Table ────────────── */
        .table-responsive { overflow-x: auto; width: 100%; }
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0; }
        .ranking-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            font-weight: 600;
            letter-spacing: 0.8px;
            background: rgba(0,0,0,0.2);
        }
        .ranking-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .ranking-table tr { cursor: pointer; transition: all 0.3s ease; }
        .ranking-table tbody tr:hover td { 
            background: var(--bg-card-hover);
            border-bottom-color: var(--accent);
        }
        .ranking-table tbody tr:hover td:first-child { border-radius: 8px 0 0 8px; }
        .ranking-table tbody tr:hover td:last-child { border-radius: 0 8px 8px 0; }
        .stock-name { font-weight: 600; font-size: 1rem; color: var(--text-primary); }
        .stock-id { color: var(--text-muted); font-size: 0.75rem; letter-spacing: 0.5px; }
        .stars { color: var(--orange); letter-spacing: 2px; text-shadow: 0 0 8px rgba(255, 184, 0, 0.4); }
        .score-bar {
            height: 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.06);
            overflow: hidden;
            width: 70px;
            display: inline-block;
            vertical-align: middle;
            margin-left: 8px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        .score-fill { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .positive { color: var(--green); text-shadow: 0 0 10px rgba(0,255,163,0.3); font-weight: 500;}
        .negative { color: var(--red); text-shadow: 0 0 10px rgba(255,51,102,0.3); font-weight: 500;}

        /* ─── Sector Flow ────────────────────── */
        .flow-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            font-size: 0.85rem;
        }
        .flow-bar .label { width: 90px; text-align: right; color: var(--text-secondary); flex-shrink: 0; font-weight: 500;}
        .flow-bar .bar-wrapper { flex: 1; height: 16px; background: rgba(0,0,0,0.3); border-radius: 8px; overflow: hidden; position: relative; box-shadow: inset 0 1px 4px rgba(0,0,0,0.4); }
        .flow-bar .bar-fill { height: 100%; border-radius: 8px; transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .flow-bar .bar-value { font-size: 0.8rem; color: var(--text-primary); width: 90px; flex-shrink: 0; text-align: left; font-weight: 600;}

        /* ─── Signal Badges ──────────────────── */
        .signal { 
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 0.75rem; 
            padding: 4px 10px; 
            border-radius: 20px; 
            margin: 3px;
            border: 1px solid transparent;
            font-weight: 500;
        }
        .signal-bullish { background: rgba(0, 255, 163, 0.1); color: var(--green); border-color: rgba(0, 255, 163, 0.2); }
        .signal-bearish { background: rgba(255, 51, 102, 0.1); color: var(--red); border-color: rgba(255, 51, 102, 0.2); }
        .signal-neutral { background: rgba(255, 184, 0, 0.1); color: var(--orange); border-color: rgba(255, 184, 0, 0.2); }

        /* ─── Loading ────────────────────────── */
        .loading {
            display: none;
            text-align: center;
            padding: 80px;
            color: var(--text-muted);
        }
        .loading.active { display: block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.26, 1.55) infinite;
            margin: 0 auto 20px;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Report ─────────────────────────── */
        .text-report {
            font-family: 'Consolas', 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            background: rgba(0,0,0,0.3);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            line-height: 1.8;
            max-height: 600px;
            overflow-y: auto;
            color: #d4d4d4;
        }
        .text-report::-webkit-scrollbar { width: 8px; }
        .text-report::-webkit-scrollbar-track { background: transparent; }
        .text-report::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ─── Metric Stat ────────────────────── */
        .stat {
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .stat:hover { background: rgba(0,0,0,0.4); border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow);}
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--text-primary); letter-spacing: -0.5px;}
        .stat-sub { font-size: 0.8rem; margin-top: 6px; display: flex; align-items: center; gap: 4px; }

        .chart-container { position: relative; height: 320px; margin-top: 10px; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>🤖 AI 台股分析師</h1>
        <div class="header-controls">
            <input type="text" id="stockInput" placeholder="輸入股票代碼或自訂清單" value="">
            <input type="date" id="dateInput">
            <button class="btn btn-primary" id="analyzeBtn" onclick="runAnalysis()">🔍 開始分析</button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="overview">📊 總覽</div>
        <div class="tab" data-tab="ranking">🎯 選股排行</div>
        <div class="tab" data-tab="rotation">🔄 族群輪動</div>
        <div class="tab" data-tab="detail">📈 個股分析</div>
        <div class="tab" data-tab="report">📝 完整報告</div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>🤖 AI 分析師工作中，請稍候...</p>
        <p style="font-size:0.75rem; margin-top:8px;">分析多檔股票可能需要 1-3 分鐘</p>
    </div>

    <!-- Main Content -->
    <div class="main" id="mainContent">
        <!-- Overview Tab -->
        <div class="tab-content active" id="tab-overview">
            <div id="welcomeMessage" style="text-align:center; padding:100px 20px;">
                <div style="font-size:4rem; margin-bottom:20px; animation: float 6s infinite ease-in-out;">🤖</div>
                <h2 style="font-size:2rem; font-weight:700; margin-bottom:16px; background:var(--gradient-1); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">AI 台股分析師</h2>
                <p style="color:var(--text-secondary); margin-bottom:12px; font-size:1.1rem;">正在載入全市場智能分析...</p>
                <div class="spinner" style="margin:30px auto;"></div>
                <p style="color:var(--text-muted); font-size:0.85rem; max-width:400px; margin:0 auto; line-height: 1.5;">系統正在比對全線上萬個數據點，包括技術線型、籌碼動向與基本面，請稍候片刻。</p>
            </div>
            <div id="overviewContent" style="display:none;">
                <div class="grid-3" id="overviewStats"></div>
                <div class="grid-2">
                    <div class="card">
                        <div class="card-title">🏆 推薦前五名</div>
                        <div id="topFive"></div>
                    </div>
                    <div class="card">
                        <div class="card-title">🔄 資金輪動摘要</div>
                        <div id="rotationSummary"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ranking Tab -->
        <div class="tab-content" id="tab-ranking">
            <div class="card">
                <div class="card-title">🎯 AI 選股排行榜 <span style="font-size: 0.8rem; font-weight: normal; color: var(--text-muted); margin-left: auto;">點擊列查看個股詳情</span></div>
                <div class="table-responsive">
                    <table class="ranking-table" id="rankingTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>股票</th>
                                <th>評等</th>
                                <th>總分</th>
                                <th>技術</th>
                                <th>籌碼</th>
                                <th>基本</th>
                                <th>收盤價</th>
                                <th>漲跌%</th>
                                <th>訊號</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Sector Rotation Tab -->
        <div class="tab-content" id="tab-rotation">
            <div class="grid-3" id="rotationPeriods"></div>
            <div class="card">
                <div class="card-title">📊 族群資金流向圖</div>
                <div class="chart-container"><canvas id="rotationChart"></canvas></div>
            </div>
        </div>

        <!-- Detail Tab -->
        <div class="tab-content" id="tab-detail">
            <div class="header-controls" style="margin-bottom:16px; justify-content:flex-start;">
                <select id="stockSelect" onchange="showStockDetail()" style="flex-grow: 1;">
                    <option value="">— 選擇股票 —</option>
                </select>
                <div style="display:flex; gap:8px;">
                    <input type="text" id="manualStockId" placeholder="代碼 ( e.g. 2454 )" style="width:120px;">
                    <button class="btn btn-primary" onclick="searchStock()" style="padding:10px 16px;">🔍 查詢</button>
                </div>
            </div>
            <div id="stockDetail"></div>
        </div>

        <!-- Report Tab -->
        <div class="tab-content" id="tab-report">
            <div class="card">
                <div class="card-title">📝 AI 每日完整報告</div>
                <div class="text-report" id="textReport">按「開始分析」產出報告</div>
            </div>
        </div>
    </div>

    <script>
        // ─── State ───────────────────────────────────
        let analysisData = null;
        let rotationChartInstance = null;
        let klineChartInstance = null;

        // ─── Tab Switching ───────────────────────────
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // ─── Run Analysis ────────────────────────────
        async function runAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const mainContent = document.getElementById('mainContent');

            btn.disabled = true;
            btn.textContent = '⏳ 分析中...';
            loading.classList.add('active');
            mainContent.style.display = 'none';

            const stocks = document.getElementById('stockInput').value;
            const date = document.getElementById('dateInput').value;

            let url = '/api/analyze?';
            if (stocks) url += 'stocks=' + encodeURIComponent(stocks) + '&';
            if (date) url += 'date=' + encodeURIComponent(date);

            try {
                const resp = await fetch(url);
                const json = await resp.json();

                if (json.status === 'ok') {
                    analysisData = json.data;
                    renderAll(json);
                } else {
                    alert('分析失敗: ' + (json.message || '未知錯誤'));
                }
            } catch (e) {
                alert('連線失敗: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔍 開始分析';
                loading.classList.remove('active');
                
                // 隱藏歡迎訊息，顯示內容
                const welcome = document.getElementById('welcomeMessage');
                if (welcome) welcome.style.display = 'none';
                const content = document.getElementById('overviewContent');
                if (content) content.style.display = 'block';
                
                mainContent.style.display = 'block';
                loadAvailableStocks();
            }
        }

        // ─── Render All ──────────────────────────────
        function renderAll(json) {
            const data = json.data;
            renderOverview(data);
            renderRanking(data);
            renderRotation(data);
            renderStockSelect(data);
            document.getElementById('textReport').textContent = json.text_report || '無報告';
        }

        // ─── Overview ────────────────────────────────
        function renderOverview(data) {
            const picks = data.top_picks || [];
            const statsDiv = document.getElementById('overviewStats');
            const topDiv = document.getElementById('topFive');
            const rotDiv = document.getElementById('rotationSummary');

            // Stats
            const totalStocks = (data.all_stocks || []).length;
            const avgScore = picks.length > 0 ? (picks.reduce((s,p) => s + p.total_score, 0) / picks.length).toFixed(1) : 'N/A';
            const topStock = picks.length > 0 ? picks[0] : null;

            statsDiv.innerHTML = `
                <div class="stat">
                    <div class="stat-label">分析日期</div>
                    <div class="stat-value">${data.date || 'N/A'}</div>
                    <div class="stat-sub" style="color:var(--text-muted)">共 ${totalStocks} 檔股票</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Top 10 平均分數</div>
                    <div class="stat-value" style="color:var(--accent)">${avgScore}</div>
                    <div class="stat-sub" style="color:var(--text-muted)">滿分 10</div>
                </div>
                <div class="stat">
                    <div class="stat-label">最佳推薦</div>
                    <div class="stat-value" style="color:var(--green)">${topStock ? topStock.stock_id : 'N/A'}</div>

        // ─── Ranking Table ───────────────────────────
        function renderRanking(data) {
            const tbody = document.querySelector('#rankingTable tbody');
            const stocks = data.all_stocks || [];

            stocks.forEach((s, i) => {
                const changePct = s.latest?.change_pct || 0;

                    const type = sig[0] === '✅' ? 'bullish' : sig[0] === '⚠️' ? 'bearish' : 'neutral';
                    return `<span class="signal signal-${type}">${sig[0]} ${sig[1]}</span>`;
                }).join('');

                const scoreColor = s => s >= 7 ? 'var(--green)' : s >= 5 ? 'var(--orange)' : 'var(--red)';
                html += `
                    <tr onclick="selectStock('${s.stock_id}')">

        // ─── Sector Rotation ─────────────────────────
        function renderRotation(data) {
            const rotation = data.sector_rotation || {};
            const periodsDiv = document.getElementById('rotationPeriods');

            let periodsHtml = '';
            ['1d', '3d', '5d'].forEach(key => {
                const d = rotation[key];
                if (!d || d.error) return;
                const inflow = Object.entries(d.top_inflow || {}).sort((a,b) => b[1]-a[1]);
                const outflow = Object.entries(d.top_outflow || {}).sort((a,b) => a[1]-b[1]);
                const maxVal = Math.max(...inflow.map(x=>x[1]), ...outflow.map(x=>Math.abs(x[1])), 1);

                let barsHtml = '';
                inflow.slice(0, 5).forEach(([sector, val]) => {
                    const pct = Math.min(100, (val / maxVal) * 100);
                    barsHtml += `
                        <div class="flow-bar">
                            <span class="label">${sector}</span>
                            <div class="bar-wrapper"><div class="bar-fill" style="width:${pct}%; background:var(--gradient-green);"></div></div>
                            <span class="bar-value positive">+${val.toLocaleString()}</span>
                        </div>
                    `;
                });
                outflow.slice(0, 5).forEach(([sector, val]) => {
                    const pct = Math.min(100, (Math.abs(val) / maxVal) * 100);
                    barsHtml += `
                        <div class="flow-bar">
                            <span class="label">${sector}</span>
                            <div class="bar-wrapper"><div class="bar-fill" style="width:${pct}%; background:var(--gradient-red);"></div></div>
                            <span class="bar-value negative">${val.toLocaleString()}</span>
                        </div>
                    `;
                });

                periodsHtml += `
                    <div class="card">
                        <div class="card-title">📊 ${key.replace('d', '')} 日資金流向</div>
                        ${barsHtml}
                    </div>
                `;
            });
            periodsDiv.innerHTML = periodsHtml;

            // Chart
            renderRotationChart(rotation);
        }

        function renderRotationChart(rotation) {
            const d3 = rotation['3d'];
            if (!d3 || d3.error) return;

            const flow = d3.sector_flow || {};
            const sorted = Object.entries(flow).sort((a,b) => b[1]-a[1]);
            const labels = sorted.map(x => x[0]);
            const values = sorted.map(x => x[1]);
            const colors = values.map(v => v >= 0 ? 'rgba(0,230,118,0.7)' : 'rgba(255,82,82,0.7)');

            if (rotationChartInstance) rotationChartInstance.destroy();

            const ctx = document.getElementById('rotationChart').getContext('2d');
            rotationChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '3日淨買賣超 (張)',
                        data: values,
                        backgroundColor: colors,
                        borderRadius: 4,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                    },
                    scales: {
                        x: { ticks: { color: '#9fa8da', font: { size: 11 } }, grid: { display: false } },
                        y: { ticks: { color: '#5c6bc0', callback: v => v.toLocaleString() }, grid: { color: 'rgba(255,255,255,0.04)' } },
                    }
                }
            });
        }

                if (json.status === 'ok' && json.data.length > 0) {
                    let html = '<option value="">— 選擇股票 (已下載) —</option>';

                        html += `<option value="${s.stock_id}">${s.stock_id} ${s.name} [${s.industry}]</option>`;

            const select = document.getElementById('stockSelect');
            const stocks = data.all_stocks || [];

            stocks.forEach(s => {

        function selectStock(stockId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('[data-tab="detail"]').classList.add('active');
            document.getElementById('tab-detail').classList.add('active');
            
            // 設定下拉選單並觸發
            const select = document.getElementById('stockSelect');
            select.value = stockId;
            showStockDetail();

        async function searchStock() {
            const input = document.getElementById('manualStockId');
            const stockId = input.value.trim();
            if (!stockId) return;

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('[data-tab="detail"]').classList.add('active');
            document.getElementById('tab-detail').classList.add('active');

            await fetchAndRenderDetail(stockId);
        }

            const stockId = document.getElementById('stockSelect').value;
            if (!stockId) return;
            await fetchAndRenderDetail(stockId);

        // ─── K-Line Chart Render ─────────────────────────────────────
        function renderKLineChart(history, darvasBox) {
            if (klineChartInstance) klineChartInstance.destroy();

            const ctx = document.getElementById('klineChart').getContext('2d');
            
            // Format data for financial chart
            const chartData = history.map(item => ({
                x: new Date(item.date).valueOf(), // Use timestamp for date-fns
                o: item.open,
                h: item.high,
                l: item.low,
                c: item.close
            }));
            
            const dates = history.map(item => new Date(item.date).valueOf());
            const ma5 = history.map(item => item.MA5 !== null ? item.MA5 : null);
            const ma10 = history.map(item => item.MA10 !== null ? item.MA10 : null);
            const ma20 = history.map(item => item.MA20 !== null ? item.MA20 : null);
            const ma60 = history.map(item => item.MA60 !== null ? item.MA60 : null);
            
            const boxTopData = darvasBox && darvasBox.history ? darvasBox.history.map((item, i) => ({ x: dates[i], y: item.top })) : [];
            const boxBottomData = darvasBox && darvasBox.history ? darvasBox.history.map((item, i) => ({ x: dates[i], y: item.bottom })) : [];

            klineChartInstance = new Chart(ctx, {
                type: 'candlestick',
                data: {
                    datasets: [
                        {
                            label: 'K線',
                            data: chartData,
                            color: {
                                up: 'rgba(255, 51, 102, 1)',
                                down: 'rgba(0, 255, 163, 1)',
                                unchanged: 'rgba(150, 150, 150, 1)'
                            },
                            order: 5 // draw candles behind MAs
                        },
                        {
                            type: 'line',
                            label: 'MA5',
                            data: history.map((item, i) => ({ x: dates[i], y: ma5[i] })),
                            borderColor: '#00f2fe',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1,
                            order: 1
                        },
                        {
                            type: 'line',
                            label: 'MA10',
                            data: history.map((item, i) => ({ x: dates[i], y: ma10[i] })),
                            borderColor: '#ffb800',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1,
                            order: 2
                        },
                        {
                            type: 'line',
                            label: 'MA20',
                            data: history.map((item, i) => ({ x: dates[i], y: ma20[i] })),
                            borderColor: '#ff00ff',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1,
                            order: 3
                        },
                        {
                            type: 'line',
                            label: 'MA60',
                            data: history.map((item, i) => ({ x: dates[i], y: ma60[i] })),
                            borderColor: '#99ff33',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1,
                            order: 4
                        },
                        {
                            type: 'line',
                            label: '箱頂 (Box Top)',
                            data: boxTopData,
                            borderColor: 'rgba(255, 99, 132, 0.8)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            pointRadius: 0,
                            spanGaps: false,
                            tension: 0,
                            order: 0,
                            hidden: !darvasBox || !darvasBox.history
                        },
                        {
                            type: 'line',
                            label: '箱底 (Box Bottom)',
                            data: boxBottomData,
                            borderColor: 'rgba(54, 162, 235, 0.8)',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            backgroundColor: 'rgba(255, 255, 255, 0.1)',
                            fill: '-1',
                            pointRadius: 0,
                            spanGaps: false,
                            tension: 0,
                            order: 0,
                            hidden: !darvasBox || !darvasBox.history
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                tooltipFormat: 'yyyy-MM-dd'
                            },
                            ticks: { color: '#a0a8c2' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        },
                        y: {
                            position: 'right',
                            ticks: { color: '#a0a8c2' },
                            grid: { color: 'rgba(255,255,255,0.05)' }
                        }
                    },
                    plugins: {
                        legend: {
                            labels: { color: '#f0f2f8', usePointStyle: true, boxWidth: 8 }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0,0,0,0.8)',
                            titleColor: '#00f2fe',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255,255,255,0.2)',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    if (context.dataset.type === 'line') {
                                        return `${context.dataset.label}: ${context.raw.y?.toFixed(2)}`;
                                    } else {
                                        return `開: ${context.raw.o} 高: ${context.raw.h} 低: ${context.raw.l} 收: ${context.raw.c}`;
                                    }
                                }
                            }
                        }
                    }
                }
            });
        }

        // ─── Download Fundamental ────────────────────────────────────
        async function downloadFundamental(stockId) {
            const btn = document.getElementById('btnDownloadFund');
            if (!btn) return;
            
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner" style="width:12px; height:12px; border-width:2px; margin-right:4px;"></span>下載中...';
            
            try {
                const response = await fetch(`/api/download_fundamental?stock_id=${stockId}`);
                const res = await response.json();
                
                if (res.status === 'ok') {
                    if (res.data && res.data.status === 'already_existed') {
                        btn.innerHTML = '✨ 資料已存在 (No API used)';
                        btn.style.background = 'rgba(0, 242, 254, 0.2)';
                        btn.style.borderColor = 'var(--accent)';
                    } else {
                        btn.innerHTML = '✅ 下載完成 (' + stockId + ')';
                        btn.style.background = 'rgba(0, 255, 163, 0.2)';
                        btn.style.borderColor = 'var(--green)';
                    }
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.disabled = false;
                        btn.style.background = '';
                        btn.style.borderColor = '';
                    }, 3000);
                } else {
                    alert('下載失敗: ' + res.message);
                    btn.innerHTML = '❌ 下載失敗';
                    btn.disabled = false;
                }
            } catch (e) {
                console.error(e);
                alert('網路或伺服器錯誤');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ─── Auto-load on page open ──────────────────
        window.addEventListener('DOMContentLoaded', () => {
            // 自動觸發全市場掃描分析
            runAnalysis();
            // 載入已有的股票選單
            loadAvailableStocks();
        });
    </script>
